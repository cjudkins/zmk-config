  - [A, R, S, T, G, M, N, E, I, O]
  - - Z
    - X
    - C
    - D
    - V
    - K
    - H
    - {t: ',', s: ;}
    - {t: ., s: ':'}
    - {t: '?', s: '!'}
  - [Pointer, '&td_shift_caps', '&morph_space', Lower]
  Pointer:
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - '&mkp MB3'
    - '&mkp MB2'
    - '&mkp MB1'
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - '&mkp MB1'
    - '&mkp MB2'
    - '&mkp MB3'
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  Lower:
  - - ESC
    - Cmd+X
    - Cmd+C
    - Cmd+V
    - Cmd+Z
    - '&tri_app'
    - Sft+Ctl+TAB
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - Ctl+TAB
  - - {t: LCTRL, h: sticky}
    - {t: LALT, h: sticky}
    - {t: LSHFT, h: sticky}
    - {t: LGUI, h: sticky}
    - {t: Opt+Ctl+LEFT SHIFT, h: sticky}
    - HOME
    - LEFT
    - DOWN
    - UP
    - RIGHT
  - - {t: ▽, type: trans}
    - Sft+TAB
    - TAB
    - RET
    - Sft+RET
    - END
    - Cmd+[
    - PG DN
    - PG UP
    - Cmd+]
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
  Raise:
  - - '`'
    - '1'
    - '2'
    - '3'
    - \
    - DELETE
    - {t: (, s: '{'}
    - {t: '[', s: <}
    - {t: ']', s: '>'}
    - {t: ), s: '}'}
  - - '-'
    - '4'
    - '5'
    - '6'
    - /
    - {t: Opt+Ctl+LEFT SHIFT, h: sticky}
    - {t: RGUI, h: sticky}
    - {t: RSHFT, h: sticky}
    - {t: LALT, h: sticky}
    - {t: RCTRL, h: sticky}
  - - '='
    - '7'
    - '8'
    - '9'
    - '0'
    - Opt+BSPC
    - BSPC
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  Adjust:
  - - AL LOCK
    - Cmd+Opt+ESCAPE
    - {t: ▽, type: trans}
    - {t: BT, h: '0'}
    - {t: BT, h: '1'}
    - PAUSE BREAK
    - F1
    - F2
    - F3
    - F4
  - - {t: LCTRL, h: sticky}
    - {t: LALT, h: sticky}
    - {t: LSHFT, h: sticky}
    - {t: LGUI, h: sticky}
    - {t: Opt+Ctl+LEFT SHIFT, h: sticky}
    - PSCRN
    - F5
    - F6
    - F7
    - F8
  - [VOL DN, PREV, NEXT, VOL UP, PP, INS, F9, F10, F11, F12]
  - - {type: held}
    - {t: ▽, type: trans}
    - BT CLR
    - {type: held}
combos:
- p: [0, 1]
  k: ESCAPE
- p: [8, 9]
  k: ESCAPE
- p: [22, 23]
  k: '&mkp MB1'
- p: [26, 27]
  k: '&mkp MB1'
- p: [21, 23]
  k: '&mkp MB2'
- p: [26, 28]
  k: '&mkp MB2'
- p: [21, 22, 23]
  k: '&mkp MB3'
- p: [26, 27, 28]
  k: '&mkp MB3'
